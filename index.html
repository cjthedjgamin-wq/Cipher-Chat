<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cipher Chat</title>

  <style>
    /* minimal safety styling so screens don't overlap */
    .screen { display: none; padding: 20px; }
    #screen-contacts { display: block; }

    button { padding: 10px 14px; margin: 5px; }
    .contact-row { padding: 10px; border-bottom: 1px solid #ddd; }
  </style>

  <!-- Libraries (SAFE with defer) -->
  <script defer src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <!-- Your app -->
  <script defer src="app.js?v=1"></script>
</head>

<body>

  <!-- CONTACT SCREEN -->
  <div id="screen-contacts" class="screen">
    <h2>Contacts</h2>

    <div id="contact-list"></div>

    <button id="btn-add-friend">+ Add Friend</button>
  </div>

  <!-- QR SCREEN -->
  <div id="screen-show-qr" class="screen">
    <h2>Your QR Code</h2>
    <div id="qr"></div>

    <button data-back="screen-contacts">Back</button>
  </div>

  <!-- SCAN SCREEN -->
  <div id="screen-scan" class="screen">
    <h2>Scan QR</h2>
    <video id="scan-video" autoplay playsinline></video>
    <canvas id="scan-canvas"></canvas>

    <p id="scan-status">Waiting...</p>

    <button data-back="screen-contacts">Back</button>
  </div>

  <!-- SETTINGS SCREEN -->
  <div id="screen-settings" class="screen">
    <h2>Settings</h2>

    <button data-back="screen-contacts">Back</button>
  </div>

</body>
</html>
